<!--
  Example: Budget table with frozen columns and multi-row header
  Demonstrates the sticky-table-freeze pattern in a financial context.
-->

<div class="stf-scroll-container" style="max-height:400px;">
  <table class="stf-table">
    <thead>
      <!-- Row 1: Year headers -->
      <tr>
        <th class="stf-frozen" style="left:0; min-width:40px;" rowspan="3">Sr</th>
        <th class="stf-frozen" style="left:40px; min-width:200px;" rowspan="3">Activity</th>
        <th class="stf-frozen" style="left:240px; min-width:100px;" rowspan="3">UoM</th>
        <th colspan="4" style="text-align:center;">Year 1</th>
        <th colspan="4" style="text-align:center;">Year 2</th>
        <th rowspan="3" style="min-width:80px;">Grand Total</th>
      </tr>

      <!-- Row 2: Quarter headers -->
      <tr>
        <!-- No frozen <th> here because Sr/Activity/UoM have rowspan="3" -->
        <th colspan="2" style="text-align:center; top:25px;">Q1</th>
        <th colspan="2" style="text-align:center; top:25px;">Q2</th>
        <th colspan="2" style="text-align:center; top:25px;">Q3</th>
        <th colspan="2" style="text-align:center; top:25px;">Q4</th>
      </tr>

      <!-- Row 3: Sub-column headers -->
      <tr>
        <th style="top:50px;">Units</th>
        <th style="top:50px;">Amount</th>
        <th style="top:50px;">Units</th>
        <th style="top:50px;">Amount</th>
        <th style="top:50px;">Units</th>
        <th style="top:50px;">Amount</th>
        <th style="top:50px;">Units</th>
        <th style="top:50px;">Amount</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td class="stf-frozen" style="left:0;">1</td>
        <td class="stf-frozen" style="left:40px;">Health Camps</td>
        <td class="stf-frozen" style="left:240px;">Numbers</td>
        <td>50</td><td>25,000</td>
        <td>60</td><td>30,000</td>
        <td>70</td><td>35,000</td>
        <td>80</td><td>40,000</td>
        <td>1,30,000</td>
      </tr>
      <tr>
        <td class="stf-frozen" style="left:0;">2</td>
        <td class="stf-frozen" style="left:40px;">Backyard Poultry</td>
        <td class="stf-frozen" style="left:240px;">Farmers</td>
        <td>100</td><td>50,000</td>
        <td>120</td><td>60,000</td>
        <td>150</td><td>75,000</td>
        <td>130</td><td>65,000</td>
        <td>2,50,000</td>
      </tr>
    </tbody>
  </table>
</div>
